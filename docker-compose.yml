services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    networks:
      - backend

  auth-api:
    build: ./auth-api
    ports:
      - "8080:8080"
    environment:
      POSTGRES_URL: ${POSTRGES_URL:-jdbc:postgresql://postgres:5432/mydb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be specified in the .env file}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:?Internal token must be specified in the .env file}
      DATA_API_URL: http://data-api:8081
    depends_on:
      - postgres
    networks:
      - backend

  data-api:
    build: ./data-api
    ports:
      - "8081:8081"
    environment:
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
    depends_on:
      - postgres
    networks:
      - backend

networks:
  backend:
    driver: bridge
